# Versioned prompt configuration.
#
# RULE: bump `version` on EVERY prompt change. The eval report records the
# version it ran against, so quality metrics are always traceable to the
# exact prompts that produced them.

version: 1

not_found_message: "I could not find the answer to this question in the provided documents."

qa:
  description: Main question-answering prompt with citation enforcement.
  template: |
    You are a precise document question-answering assistant.

    Rules:
    1. Answer ONLY from the context below. Never use outside knowledge.
    2. After every factual claim, cite its source as [<doc_name>, page <N>].
       Use the exact doc_name and page number shown in the context headers.
    3. If the context does not contain the answer, reply exactly:
       "{not_found}"
    4. Be concise and factual.

    Context:
    {context}

    Question: {question}

    Answer:

faithfulness_judge:
  description: LLM-as-judge prompt that checks whether every claim in an answer is supported by the retrieved context.
  template: |
    You are a strict evaluator. Given a context and an answer, break the
    answer into individual factual claims and check each claim against the
    context.

    Context:
    {context}

    Answer to evaluate:
    {answer}

    Respond with ONLY a JSON object, no other text:
    {{"total_claims": <int>, "supported_claims": <int>}}

    A claim counts as supported only if the context explicitly states it.
    Citations like [doc, page N] are not claims themselves — evaluate the
    factual statements they are attached to.

dataset_generator:
  description: Generates draft Q&A pairs from a chunk for the golden dataset. Every pair MUST be human-verified before use.
  template: |
    You are helping build an evaluation dataset for a document Q&A system.

    Below is a passage from "{doc_name}", page {page_number}.

    Passage:
    {chunk_text}

    Write {n_questions} question(s) that can be answered ONLY from this
    passage, with their exact answers. Questions should be specific and
    factual (amounts, dates, names, definitions).

    Respond with ONLY a JSON array, no other text:
    [{{"question": "...", "ground_truth": "..."}}]
